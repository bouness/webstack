name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.0.0)'
        required: false
        default: 'dev'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480
    outputs:
      version:  ${{ steps.version.outputs.version }}
      filesize: ${{ steps.package.outputs.filesize }}
      checksum: ${{ steps.package.outputs.checksum }}
      run_file: ${{ steps.package.outputs.run_file }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
          echo "Building version: $(cat "$GITHUB_OUTPUT" | grep version)"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc g++ make perl pkg-config \
            wget curl xz-utils autoconf automake libtool bison \
            makeself python3-venv python3-dev patchelf

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghcActions /usr/local/share/boost 2>/dev/null || true
          sudo apt-get clean
          df -h /

      # ── Phase 1: Compile web stack ───────────────────────────────────
      - name: Build web stack (Phase 1 only)
        run: |
          echo "::group::Phase 1 Build"
          bash install.sh --build-only
          echo "::endgroup::"
        env:
          DEBIAN_FRONTEND: noninteractive

      # ── Phase 1b: Compile control panel ──────────────────────────────
      - name: Install Python / Nuitka / PySide6
        run: |
          echo "::group::Python environment setup"
          python3 -m venv /opt/nuitka-venv
          /opt/nuitka-venv/bin/pip install --upgrade pip
          /opt/nuitka-venv/bin/pip install \
            'nuitka>=2.1,<3.0' \
            'PySide6>=6.6,<6.9' \
            'ordered-set>=4.1'
          echo "::endgroup::"

      - name: Compile control panel with Nuitka
        run: |
          echo "::group::Nuitka compilation (15-40 min)"
          /opt/nuitka-venv/bin/python -m nuitka \
            --standalone \
            --follow-imports \
            --enable-plugin=pyside6 \
            --jobs="$(nproc)" \
            --output-filename=webstack-manager \
            --output-dir=/tmp/nuitka-build \
            cp.py
          echo "::endgroup::"

      - name: Install control panel into /opt/webstack
        run: |
          rm -rf /opt/webstack/manager
          mv /tmp/nuitka-build/cp.dist /opt/webstack/manager

          # Strip debug symbols from the compiled binary
          strip --strip-debug /opt/webstack/manager/webstack-manager 2>/dev/null || true

          # Remove Qt translations (~15 MB, not needed for this app)
          rm -rf /opt/webstack/manager/Qt/translations 2>/dev/null || true

          # Remove Nuitka build cache
          rm -rf /tmp/nuitka-build /opt/nuitka-venv

          echo "=== Control panel ==="
          ls -lh /opt/webstack/manager/webstack-manager
          du -sh /opt/webstack/manager/

      # ── Optimize for distribution ────────────────────────────────────
      - name: Optimize /opt/webstack for distribution
        run: |
          echo "=== Size before cleanup ==="
          du -sh /opt/webstack
          du -sh /opt/webstack/*/  2>/dev/null || true

          # Web stack cleanup (headers, docs, build artifacts)
          rm -rf /opt/webstack/build
          rm -rf /opt/webstack/downloads
          rm -rf /opt/webstack/deps/include
          rm -rf /opt/webstack/postgresql/include
          rm -rf /opt/webstack/deps/share/man
          rm -rf /opt/webstack/deps/share/doc
          rm -rf /opt/webstack/deps/share/gtk-doc
          rm -rf /opt/webstack/deps/share/info
          rm -rf /opt/webstack/nginx/html
          rm -rf /opt/webstack/postgresql/share/doc
          rm -rf /opt/webstack/postgresql/share/man

          # Remove static libraries and libtool archives
          find /opt/webstack -path '/opt/webstack/manager' -prune -o \
            -name '*.a' -type f -print -delete 2>/dev/null || true
          find /opt/webstack -path '/opt/webstack/manager' -prune -o \
            -name '*.la' -type f -print -delete 2>/dev/null || true

          # Remove test files
          find /opt/webstack -path '/opt/webstack/manager' -prune -o \
            \( -name '*.test' -o -name '_test*' -o -name '*.bench' \) \
            -type f -print -delete 2>/dev/null || true

          # Strip debug symbols (skip manager — already stripped)
          echo "Stripping debug symbols..."
          find /opt/webstack -path '/opt/webstack/manager' -prune -o \
            -type f -executable -size +1k \
            ! -name '*.py' ! -name '*.sh' ! -name '*.pl' \
            -print -exec sh -c '
              file "$1" 2>/dev/null | grep -q "not stripped" && \
              strip --strip-debug "$1" 2>/dev/null && echo "  stripped: $1"
            ' _ {} \;

          find /opt/webstack -path '/opt/webstack/manager' -prune -o \
            -type f -name '*.so*' -size +1k \
            -print -exec sh -c '
              file "$1" 2>/dev/null | grep -q "not stripped" && \
              strip --strip-debug "$1" 2>/dev/null && echo "  stripped: $1"
            ' _ {} \;

          # Remove empty directories
          find /opt/webstack -type d -empty -delete 2>/dev/null || true

          echo ""
          echo "=== Size after cleanup ==="
          du -sh /opt/webstack
          du -sh /opt/webstack/*/  2>/dev/null || true

      # ── Package into .run ────────────────────────────────────────────
      - name: Create .run installer
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="/tmp/webstack-staging"
          RUN_FILE="webstack-installer-${VERSION}-linux-x86_64.run"

          rm -rf "$STAGING"
          mkdir -p "$STAGING/webstack"
          mkdir -p "$STAGING"

          cp -a /opt/webstack/. "$STAGING/webstack/"
          cp install.sh "$STAGING/installer.sh"
          cp ci/setup.sh "$STAGING/setup.sh"
          chmod +x "$STAGING/setup.sh"

          echo "Staging size:"
          du -sh "$STAGING"

          makeself \
            --gzip \
            --nox11 \
            "$STAGING" \
            "$RUN_FILE" \
            "Linux Universal Web Stack Installer v${VERSION}" \
            ./setup.sh

          FILESIZE=$(du -h "$RUN_FILE" | cut -f1)
          CHECKSUM=$(sha256sum "$RUN_FILE" | awk '{print $1}')

          # Use GITHUB_OUTPUT (not GITHUB_ENV) so values are available as job outputs
          echo "run_file=$RUN_FILE"  >> "$GITHUB_OUTPUT"
          echo "filesize=$FILESIZE"  >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM"  >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== .run file created ==="
          ls -lh "$RUN_FILE"
          echo "SHA256: $CHECKSUM"

      - name: Upload .run artifact
        uses: actions/upload-artifact@v4
        with:
          name: webstack-installer-${{ steps.version.outputs.version }}
          path: ${{ steps.package.outputs.run_file }}
          retention-days: 14
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download .run artifact
        uses: actions/download-artifact@v4
        with:
          name: webstack-installer-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          RUN_FILE="webstack-installer-${VERSION}-linux-x86_64.run"
          FILESIZE="${{ needs.build.outputs.filesize }}"
          CHECKSUM="${{ needs.build.outputs.checksum }}"

          gh release create "$TAG" "$RUN_FILE" \
            --title "Web Stack Installer v${VERSION}" \
            --notes "## Download

          \`$RUN_FILE\` (${{ needs.build.outputs.filesize }})

          ### SHA256
          \`\`\`
          ${{ needs.build.outputs.checksum }}
          \`\`\`

          ## Quick Install
          \`\`\`bash
          chmod +x $RUN_FILE
          ./$RUN_FILE
          \`\`\`

          ## What's Inside
          - **Nginx** — high-performance HTTP server
          - **PHP** 8.5 / 8.4 / 8.3 — with FPM, OPCache JIT, GD, Intl, Sodium, XSL, Zip
          - **MariaDB** — MySQL-compatible database
          - **PostgreSQL** — advanced SQL database
          - **WebStack Manager** — GUI control panel (start/stop/switch PHP/view logs)
          - All dependencies bundled — no system packages required

          ## Requirements
          - x86_64 Linux with a desktop environment (for the GUI manager)
          - glibc >= 2.35 (Ubuntu 22.04+, Debian 12+, Fedora 36+, RHEL 9+)
          - sudo access (to install to /opt/webstack)
          - ~600 MB disk space for /opt/webstack

          ## After Install
          \`\`\`bash
          export PATH=\"\$HOME/.local/bin:\$PATH\"
          webstack-start        # start all services (CLI)
          webstack-manager      # open GUI control panel
          # Open http://localhost:8080
          \`\`\`

          ## GUI Manager
          The installer creates a desktop entry so you can find **WebStack Manager**
          in your application menu. You can also run \`webstack-manager\` from
          a terminal.

          If you're on a headless server, use the CLI tools instead:
          \`webstack-start\`, \`webstack-stop\`, \`webstack-php 8.4\`, etc.

          ## Credentials
          | Service     | User      | Password |
          |-------------|-----------|----------|
          | MariaDB     | root      | 123456   |
          | MariaDB     | webstack  | webstack |
          | PostgreSQL  | postgres  | 123456   |

          ## CLI Tools
          \`webstack-start\` · \`webstack-stop\` · \`webstack-php <ver>\` ·
          \`webstack-mysql\` · \`webstack-psql\` · \`webstack-php-cli\` ·
          \`webstack-composer\`

          ---
          *Built on Ubuntu 22.04 for maximum Linux compatibility.*"
